server {
    listen 80;
    server_name tandemclip.com www.tandemclip.com;
    root /usr/share/nginx/html;
    index index.html;

    # Appcast is XML; DMGs are binary downloads.
    types { application/xml xml; text/html html; }
    default_type application/octet-stream;
    sendfile on;

    # Security headers. NOTE: nginx does NOT inherit `add_header` into a location
    # that defines its own, so these are repeated in each location below.
    # TLS is terminated by the fronting proxy (proxy_net); HSTS here is passed
    # through so browsers pin HTTPS for the apex + subdomains.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /appcast.xml {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "public, max-age=300";
        default_type application/xml;
    }

    location ~ \.dmg$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "public, max-age=86400";
        default_type application/octet-stream;
    }

    location / {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/ =404;
    }
}
