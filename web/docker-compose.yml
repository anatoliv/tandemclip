services:
  web:
    image: nginx:1.27-alpine
    container_name: tandemclip_web
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
